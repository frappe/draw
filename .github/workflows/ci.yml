name: CI

# Runs on every pull request into main, and on pushes to main itself, so a
# change can't reach main without the frontend building and all unit tests
# passing. Pair this with a branch-protection "required status check" on main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  frontend:
    name: Frontend build & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Unit tests
        run: yarn test

      - name: Build
        run: yarn build

  server:
    name: Server tests
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host localhost --user root --password=root"
          --health-interval=5s --health-timeout=2s --health-retries=15
      redis-cache:
        image: redis:6.2-alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:6.2-alpine
        ports:
          - 11000:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install bench + create test site
        run: bash ${GITHUB_WORKSPACE}/.github/helper/install.sh

      - name: Run server tests
        working-directory: /home/runner/frappe-bench
        run: bench --site test_site run-tests --app draw
